
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HisabPro Personal V1.4</title>
<meta name="theme-color" content="#13824f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f9ff;
color:#123;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}
.splash{
text-align:center;
animation:fadeIn 1.2s ease;
}
.logo{
width:140px;
height:140px;
border-radius:30px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
animation:pop 1s ease;
}
h1{
margin:20px 0 5px;
font-size:42px;
color:#0b3a66;
}
h1 span{color:#13824f;}
p{
font-size:20px;
color:#456;
}
.install{
margin-top:25px;
display:inline-block;
padding:14px 24px;
background:#13824f;
color:white;
border-radius:14px;
font-weight:bold;
animation:pulse 2s infinite;
}
.footer{
position:absolute;
bottom:15px;
font-size:12px;
color:#666;
}
@keyframes fadeIn{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}
@keyframes pop{
0%{transform:scale(0.8);}
60%{transform:scale(1.05);}
100%{transform:scale(1);}
}
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}
</style>
</head>
<body>
<div class="splash">
<img src="icons/icon-512.png" class="logo">
<h1>Hisab<span>Pro</span></h1>
<p>हिसाब प्रो</p>
<div class="install">Offline Ready • Installable App</div>
</div>
<div class="footer">© 2026 Sonam Tsering Gurung · HisabPro</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>
</body>
</html>
